<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merci</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f8f8f6;
      color: #1f1f1f;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }

    .box {
      background: white;
      max-width: 600px;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 36px;
    }

    p {
      font-size: 18px;
      color: #4b5563;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      background: #d97706;
      color: white;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: bold;
    }

    a:hover {
      background: #b45309;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Merci !</h1>
    <p>Votre inscription a bien été reçue.</p>
    <p>Nous vous informerons dès le lancement dans votre région.</p>
    <a href="/">Retour à l’accueil</a>
  </div>
</body>
</html>
